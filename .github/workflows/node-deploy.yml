name: Deploy Node API

on:
  push:
    branches: ["main"]
    paths:
      - "Api-Node/**"
      - ".github/workflows/node-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Api-Node
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Api-Node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Smoke test
        run: node -e "require('./index.js'); setTimeout(() => process.exit(0), 2000)"
        env:
          PORT: 3000

      - name: Trigger Render deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_NODE != '' }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_NODE"
        env:
          RENDER_DEPLOY_HOOK_NODE: ${{ secrets.RENDER_DEPLOY_HOOK_NODE }}
