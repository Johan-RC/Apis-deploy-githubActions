name: Deploy Django API

on:
  push:
    branches: ["main"]
    paths:
      - "Api-Django/**"
      - ".github/workflows/django-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Api-Django
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django check
        run: python manage.py check

      - name: Trigger Render deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_DJANGO != '' }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_DJANGO"
        env:
          RENDER_DEPLOY_HOOK_DJANGO: ${{ secrets.RENDER_DEPLOY_HOOK_DJANGO }}
